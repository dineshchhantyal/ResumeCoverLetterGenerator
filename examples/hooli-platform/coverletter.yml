    I am excited to apply for the Platform Engineer role at Hooli. I enjoy making other engineers more productive by building reliable infrastructure and the internal tooling that sits underneath it.

    I work day to day with Docker, Kubernetes, Terraform, and CI/CD on AWS. At Example Corp I moved a legacy module to a Dockerized service on AWS ECS and cut deploy time from 40 minutes to under 8 minutes, and I automated builds and deploys that kept a platform at 99.9 percent uptime for thousands of users. As an intern I migrated a service to Docker and Kubernetes and dropped deploy time from 20 minutes to 3 minutes. I care about reliability, testing, and reducing production incidents.

    I would welcome the chance to contribute to your developer platform team. Please reach me at +1-555-0100 or jane.doe@example.com.
