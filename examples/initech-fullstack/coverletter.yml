  enclosure: "Enclosure: Resume"
  body: |
    I am excited to apply for the Full Stack Engineer role at Initech. I build end to end web applications and enjoy owning features across the stack, from the database up to the browser.

    At Example Corp I shipped a React and FastAPI platform serving more than 10,000 users at 99.9 percent uptime, and I designed REST and GraphQL APIs that cut average response latency from 800ms to 200ms. I model and query PostgreSQL daily, containerize services with Docker, and deploy to AWS behind automated CI/CD. My side projects, including an event driven AWS app with Next.js and PostgreSQL, reflect how much I like shipping real software end to end.

    Initech's focus on a small team that owns features from data model to UI is exactly where I do my best work. I would welcome the chance to contribute. Please reach me at +1-555-0100 or jane.doe@example.com.
