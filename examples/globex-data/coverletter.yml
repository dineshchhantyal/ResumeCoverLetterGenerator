# BUSINESS COVER LETTER FORMATTING RULES:
# IMPORTANT: Do not use dashes (-) or em-dashes in sentences. Use periods, commas, or restructure sentences instead.
#
# personal_information: your name, address, phone, email, homepage
# recipient: name, company, title, address
# letter: date, opening greeting, body paragraphs, enclosure

personal_information:
  name: "Jane Doe"
  address:
    line: "San Francisco, CA"
    postal_code: "94105"
    country: "United States"
  phone:
    mobile: "+1-555-0100"
  email: "jane.doe@example.com"
  homepage: "https://www.example.com"

recipient:
  name: "Hiring Team"
  company: "Globex Data"
  title: "Data Engineer"
  address: "San Francisco, CA"

letter:
  date: "January 1, 2025"
  opening: "Dear Globex Data Team:"
  enclosure: "Enclosure: Resume"
  body: |
    I am excited to apply for the Data Engineer role at Globex Data. Turning messy source data into clean, dependable datasets is the work I enjoy most, and your data platform team sounds like exactly the kind of high leverage place where I want to build.

    My experience maps closely to what you need. At Sample Labs I developed a Python data ingestion pipeline that processed two million records per day at 99.9 percent reliability. At Example Corp I designed PostgreSQL data models, tuned SQL queries behind an internal dashboard, and shipped services on AWS, while raising backend test coverage from 55 percent to 88 percent. I am comfortable with Python, SQL, ETL pipelines, and AWS services such as S3 and Lambda, and I care about data quality, testing, and monitoring.

    I would welcome the chance to contribute to your pipelines and datasets. Please reach me at +1-555-0100 or jane.doe@example.com.
